<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프롬프트 구조도 뷰어</title>
<style>
:root {
  --bg: #0f1117; --bg2: #1a1d27; --bg3: #252830;
  --text: #e4e6eb; --text2: #a0a3ab; --text3: #6b6f7b;
  --accent: #7c5cfc; --accent2: #5b3fd9;
  --green: #22c55e; --yellow: #f59e0b; --red: #ef4444; --blue: #3b82f6;
  --border: #2a2d37; --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Pretendard', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* 헤더 */
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 700; }
.header .badge { background: var(--accent); color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 11px; }

/* 레이아웃 */
.layout { display: flex; height: calc(100vh - 56px); }

/* 왼쪽 사이드바 */
.sidebar { width: 340px; min-width: 280px; background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.tree-section { padding: 8px 0; }
.tree-section-title {
  padding: 8px 16px; font-size: 11px; font-weight: 700; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none;
  display: flex; align-items: center; gap: 6px;
}
.tree-section-title:hover { color: #fff; }
.tree-section-title .arrow { transition: transform 0.2s; font-size: 10px; }
.tree-section-title.collapsed .arrow { transform: rotate(-90deg); }
.tree-section-title.collapsed + .tree-items { display: none; }

.tree-item {
  padding: 6px 16px 6px 28px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  color: var(--text2); transition: all 0.15s;
}
.tree-item:hover { background: var(--bg3); color: var(--text); }
.tree-item.active { background: var(--accent2); color: #fff; }
.tree-item .icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.tree-item .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tree-item .tag {
  font-size: 9px; padding: 1px 6px; border-radius: 8px; flex-shrink: 0; font-weight: 600;
}
.tag-sys { background: rgba(59,130,246,0.2); color: var(--blue); }
.tag-user { background: rgba(34,197,94,0.2); color: var(--green); }
.tag-prompt { background: rgba(124,92,252,0.2); color: var(--accent); }
.tag-lines { background: rgba(107,111,123,0.15); color: var(--text3); }

.tree-sub { padding-left: 16px; }

/* 오른쪽 메인 */
.main { flex: 1; overflow-y: auto; padding: 24px; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text3); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; }

.prompt-view { max-width: 900px; }
.prompt-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.prompt-meta { font-size: 12px; color: var(--text3); margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
.prompt-meta span { display: flex; align-items: center; gap: 4px; }

.prompt-tabs { display: flex; gap: 4px; margin-bottom: 16px; }
.prompt-tab {
  padding: 8px 16px; border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600;
  cursor: pointer; background: var(--bg3); color: var(--text2); border: 1px solid var(--border); border-bottom: none;
}
.prompt-tab.active { background: var(--bg2); color: var(--accent); }

.prompt-content {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 0 var(--radius) var(--radius) var(--radius);
  padding: 20px; white-space: pre-wrap; font-size: 13px; line-height: 1.7; font-family: 'JetBrains Mono', 'D2Coding', monospace;
  color: var(--text); min-height: 200px; max-height: calc(100vh - 260px); overflow-y: auto; position: relative;
}
.prompt-content::-webkit-scrollbar { width: 4px; }
.prompt-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.copy-btn {
  position: absolute; top: 12px; right: 12px; background: var(--accent); color: #fff;
  border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600;
}
.copy-btn:hover { background: var(--accent2); }

.copy-claude-btn {
  margin-top: 12px; background: #d97706; color: #fff; border: none; padding: 10px 20px;
  border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; width: 100%;
}
.copy-claude-btn:hover { background: #b45309; }

.loading { color: var(--text3); font-size: 13px; padding: 40px; text-align: center; }

/* 검색 */
.search-box { padding: 12px 16px; }
.search-box input {
  width: 100%; padding: 8px 12px; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text3); }

/* 반응형 */
@media (max-width: 768px) {
  .layout { flex-direction: column; height: auto; }
  .sidebar { width: 100%; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
  .main { min-height: 60vh; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📐 프롬프트 구조도</h1>
  <span class="badge">18개 프롬프트</span>
</div>

<div class="layout">
  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="🔍 채널 검색..." oninput="filterTree(this.value)">
    </div>
    <div id="treeContainer"></div>
  </div>

  <!-- 메인 -->
  <div class="main" id="mainContent">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>왼쪽에서 프롬프트를 선택하세요</p>
    </div>
  </div>
</div>

<script>
// 채널 구조 정의
const STRUCTURE = [
  {
    section: '블로그',
    icon: '📝',
    file: 'src/api/blog.py',
    lines: 553,
    prompts: [
      { channel: '블로그_제목', label: '제목 생성', icon: '🏷️' },
      { channel: '블로그_본문', label: '본문 생성', icon: '📄' },
    ]
  },
  {
    section: '카페 외부',
    icon: '☕',
    file: 'src/api/cafe.py',
    lines: 793,
    prompts: [
      { channel: '카페SEO_제목', label: '제목 변환', icon: '🏷️' },
      { channel: '카페SEO_본문', label: '본문 생성', icon: '📄' },
      { channel: '카페SEO_댓글', label: '댓글 생성', icon: '💬' },
    ]
  },
  {
    section: '카페 내부',
    icon: '🔥',
    file: 'src/api/viral.py',
    lines: 327,
    prompts: [
      { channel: '카페바이럴_일상글', label: '1단계: 일상글', icon: '1️⃣' },
      { channel: '카페바이럴_고민글', label: '2단계: 고민글', icon: '2️⃣' },
      { channel: '카페바이럴_침투글', label: '3단계: 침투글+댓글', icon: '3️⃣' },
    ]
  },
  {
    section: '지식인',
    icon: '❓',
    file: 'src/api/jisikin.py',
    lines: 393,
    prompts: [
      { channel: '지식인_질문제목', label: '질문 제목', icon: '🏷️' },
      { channel: '지식인_질문본문', label: '질문 본문', icon: '📄' },
      { channel: '지식인_답변', label: '답변 생성', icon: '💡' },
    ]
  },
  {
    section: '유튜브댓글',
    icon: '▶️',
    file: 'src/api/youtube.py',
    lines: 879,
    prompts: [
      { channel: '유튜브댓글', label: '댓글 생성', icon: '💬' },
    ]
  },
  {
    section: '틱톡',
    icon: '🎵',
    file: 'src/api/tiktok.py',
    lines: 211,
    prompts: [
      { channel: '틱톡', label: '스크립트 생성', icon: '📄' },
    ]
  },
  {
    section: '커뮤니티',
    icon: '💬',
    file: 'src/api/community.py',
    lines: 279,
    prompts: [
      { channel: '커뮤니티', label: '침투글+댓글', icon: '📄' },
    ]
  },
  {
    section: '쓰레드',
    icon: '🧵',
    file: 'src/api/threads.py',
    lines: 1056,
    prompts: [
      { channel: '쓰레드_일상글', label: '일상글', icon: '☀️' },
      { channel: '쓰레드_물길글_셔플', label: '물길글 (셔플)', icon: '🔀' },
      { channel: '쓰레드_물길글_연민', label: '물길글 (연민)', icon: '💧' },
      { channel: '쓰레드_물길글_후기', label: '물길글 (후기)', icon: '⭐' },
    ]
  },
];

let currentChannel = null;
let currentTab = 'system';
let promptCache = {};

// 트리 렌더링
function renderTree() {
  const container = document.getElementById('treeContainer');
  container.innerHTML = STRUCTURE.map((group, gi) => `
    <div class="tree-section" data-section="${group.section}">
      <div class="tree-section-title" onclick="toggleSection(this)">
        <span class="arrow">▼</span>
        ${group.icon} ${group.section}
        <span class="tag tag-lines">${group.file} · ${group.lines}줄</span>
      </div>
      <div class="tree-items">
        ${group.prompts.map(p => `
          <div class="tree-item" data-channel="${p.channel}" onclick="selectPrompt('${p.channel}', this)">
            <span class="icon">${p.icon}</span>
            <span class="name">${p.label}</span>
            <span class="tag tag-prompt">프롬프트</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleSection(el) {
  el.classList.toggle('collapsed');
}

function filterTree(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.tree-section').forEach(sec => {
    const section = sec.dataset.section.toLowerCase();
    const items = sec.querySelectorAll('.tree-item');
    let anyVisible = false;
    items.forEach(item => {
      const ch = item.dataset.channel.toLowerCase();
      const name = item.querySelector('.name').textContent.toLowerCase();
      const visible = !q || section.includes(q) || ch.includes(q) || name.includes(q);
      item.style.display = visible ? '' : 'none';
      if (visible) anyVisible = true;
    });
    sec.style.display = anyVisible ? '' : 'none';
    // 검색 중이면 펼치기
    if (q) sec.querySelector('.tree-section-title').classList.remove('collapsed');
  });
}

async function selectPrompt(channel, el) {
  // 활성 표시
  document.querySelectorAll('.tree-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentChannel = channel;
  currentTab = 'system';

  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="loading">프롬프트 로딩 중...</div>';

  try {
    // 캐시 확인
    if (!promptCache[channel]) {
      const r = await fetch('/api/prompt-test/get-full?channel=' + encodeURIComponent(channel));
      promptCache[channel] = await r.json();
    }
    renderPrompt(channel);
  } catch(e) {
    main.innerHTML = `<div class="loading">로드 실패: ${e.message}</div>`;
  }
}

function renderPrompt(channel) {
  const data = promptCache[channel];
  const sysLen = (data.system_prompt || '').length;
  const userLen = (data.user_prompt || '').length;
  const totalLen = sysLen + userLen;

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="prompt-view">
      <div class="prompt-title">${channel.replace(/_/g, ' → ')}</div>
      <div class="prompt-meta">
        <span>📏 시스템: ${sysLen.toLocaleString()}자</span>
        <span>📏 유저: ${userLen.toLocaleString()}자</span>
        <span>📏 합계: ${totalLen.toLocaleString()}자</span>
        ${data.is_override ? '<span style="color:#f59e0b">⚠️ 커스텀 오버라이드 적용중</span>' : ''}
      </div>

      <div class="prompt-tabs">
        <div class="prompt-tab ${currentTab === 'system' ? 'active' : ''}" onclick="switchTab('system')">🔧 시스템 프롬프트</div>
        <div class="prompt-tab ${currentTab === 'user' ? 'active' : ''}" onclick="switchTab('user')">👤 유저 프롬프트</div>
        <div class="prompt-tab ${currentTab === 'combined' ? 'active' : ''}" onclick="switchTab('combined')">📋 시크릿 채팅용 통합</div>
      </div>

      <div style="position:relative;">
        <div class="prompt-content" id="promptText">${escHtml(getTabContent(data))}</div>
        <button class="copy-btn" onclick="copyCurrentTab()">📋 복사</button>
      </div>

      <div style="margin-top:24px;padding:20px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--accent)">🚀 실제 데이터로 프롬프트 생성 (시크릿 채팅용)</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:12px">크롤링+분석+제목까지 서버에서 수행. 시크릿 채팅에 붙여넣어 테스트하세요.</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <input id="bpKeyword" placeholder="키워드" style="padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="bpProdName" placeholder="제품명" style="padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="bpProdUSP" placeholder="핵심 특징(USP)" style="padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="bpProdIngr" placeholder="주요 성분" style="padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="bpProdTarget" placeholder="타겟층" style="padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="bpBrandKw" placeholder="나만의 키워드" style="padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
        </div>
        <div style="margin-bottom:8px;display:none;" id="bpTitleRow">
          <input id="bpTitle" placeholder="제목 (claude.ai에서 생성한 제목을 여기에 입력 → 본문 프롬프트에 반영)" style="width:100%;padding:8px;background:var(--bg);border:1px solid #f59e0b;border-radius:6px;color:var(--text);font-size:13px">
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="buildRealPrompt('single')" style="padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600" id="bpBtn">🚀 이 프롬프트만 생성</button>
          <button onclick="buildRealPrompt('all')" style="padding:8px 20px;background:#22c55e;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600" id="bpBtnAll">📦 전체 사이클 생성</button>
        </div>
        <div id="bpResult" style="margin-top:12px"></div>
      </div>

      <div style="margin-top:24px;padding:20px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border)">
        <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:#f59e0b">✅ 결과물 체크 (본문 붙여넣기 → 자동 검증)</div>
        <textarea id="outputCheck" placeholder="claude.ai에서 생성된 본문을 여기에 붙여넣으세요" style="width:100%;height:150px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;resize:vertical;margin-bottom:8px"></textarea>
        <div style="display:flex;gap:8px;margin-bottom:8px;">
          <input id="checkKeyword" placeholder="키워드" style="flex:1;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="checkTargetChar" placeholder="목표 글자수" type="number" style="width:120px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="checkTargetKw" placeholder="목표 키워드수" type="number" style="width:120px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
          <input id="checkTargetPhoto" placeholder="목표 사진수" type="number" style="width:120px;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px">
        </div>
        <button onclick="runOutputCheck()" style="padding:8px 20px;background:#f59e0b;color:#000;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600">✅ 체크</button>
        <div id="checkResult" style="margin-top:12px"></div>
      </div>
    </div>
  `;

  // 채널에 따라 제목 입력란 + 버튼 텍스트 동적 처리
  setTimeout(() => {
    const titleRow = document.getElementById('bpTitleRow');
    const btnSingle = document.getElementById('bpBtn');
    const ch = channel || '';
    const isTitle = ch.includes('제목') || ch.includes('변환') || ch.includes('질문제목');
    const isBody = ch.includes('본문') || ch.includes('질문본문');
    const isComments = ch.includes('댓글');
    const isReplies = ch.includes('답글');
    const isAnswers = ch.includes('답변');

    // 제목 프롬프트면 제목 입력란 숨김
    if (titleRow) titleRow.style.display = isTitle ? 'none' : 'block';

    // 버튼 텍스트 동적 변경
    if (btnSingle) {
      if (isTitle) btnSingle.textContent = '🚀 제목 프롬프트 생성';
      else if (isBody) btnSingle.textContent = '🚀 본문 프롬프트 생성';
      else if (isComments) btnSingle.textContent = '🚀 댓글 프롬프트 생성';
      else if (isReplies) btnSingle.textContent = '🚀 답글 프롬프트 생성';
      else if (isAnswers) btnSingle.textContent = '🚀 답변 프롬프트 생성';
      else btnSingle.textContent = '🚀 이 프롬프트만 생성';
    }
  }, 0);
}

function getTabContent(data) {
  if (currentTab === 'system') return data.system_prompt || '(없음)';
  if (currentTab === 'user') return data.user_prompt || '(없음)';
  // combined
  return `[시스템 프롬프트]\n${data.system_prompt || ''}\n\n──────────────────────────────\n\n[유저 프롬프트]\n${data.user_prompt || ''}`;
}

function switchTab(tab) {
  currentTab = tab;
  if (currentChannel && promptCache[currentChannel]) {
    renderPrompt(currentChannel);
  }
}

function copyCurrentTab() {
  const data = promptCache[currentChannel];
  const text = getTabContent(data);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ 복사됨';
    setTimeout(() => btn.textContent = '📋 복사', 1500);
  });
}

function wrapForSecretChat(sysPrompt, usrPrompt) {
  return `아래 [역할]과 [규칙]을 반드시 지켜서 [작업]을 수행해.
규칙을 하나라도 어기면 처음부터 다시 써.

[역할]
${sysPrompt || ''}

[작업]
${usrPrompt || ''}

[최종 확인]
- 위 [역할]의 모든 규칙을 빠짐없이 지켰는지 확인한 뒤 출력해.
- 본문만 출력하고, 부연 설명이나 인사말은 붙이지 마.`;
}

function copyCombinedForClaude() {
  const data = promptCache[currentChannel];
  if (!data) return;
  const wrapped = wrapForSecretChat(data.system_prompt, data.user_prompt);
  navigator.clipboard.writeText(wrapped).then(() => {
    const btn = document.querySelector('.copy-claude-btn');
    btn.textContent = '✅ 클립보드에 복사됨 → 시크릿 채팅에 붙여넣기';
    setTimeout(() => btn.textContent = '📋 시크릿 채팅용 프롬프트 복사', 2000);
  }).catch(() => {
    alert('클립보드 접근 실패. 수동으로 복사하세요.');
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 실제 데이터로 프롬프트 생성 ──

async function buildRealPrompt(mode) {
  // mode: 'single' = 현재 선택된 프롬프트만, 'all' = 전체 사이클
  const keyword = document.getElementById('bpKeyword')?.value?.trim();
  if (!keyword) return alert('키워드를 입력하세요');
  const product = {
    name: document.getElementById('bpProdName')?.value || '',
    usp: document.getElementById('bpProdUSP')?.value || '',
    ingredients: document.getElementById('bpProdIngr')?.value || '',
    target: document.getElementById('bpProdTarget')?.value || '',
    brand_keyword: document.getElementById('bpBrandKw')?.value || '',
  };

  // 현재 채널에 따라 API 분기
  const ch = currentChannel || '';
  const userTitle = document.getElementById('bpTitle')?.value?.trim() || '';
  let apiChannel = '';
  let bodyData = {};

  if (ch.startsWith('블로그')) {
    apiChannel = 'blog';
    bodyData = { keywords: [{keyword, stage: '3_정보습득'}], product, user_title: userTitle };
  } else if (ch.startsWith('카페SEO')) {
    apiChannel = 'cafe';
    bodyData = { keywords: [{keyword}], urls: [], product, settings: {}, user_title: userTitle };
  } else if (ch.startsWith('파워컨텐츠')) {
    apiChannel = 'powercontent';
    bodyData = { keyword, stage: '3_정보습득', appeal: '', buying_thing: '', deficit_level: '-4', product, analysis: '' };
  } else if (ch.startsWith('지식인')) {
    apiChannel = 'jisikin';
    bodyData = { keywords: [{keyword}], product };
  } else if (ch.startsWith('카페바이럴')) {
    apiChannel = 'viral';
    bodyData = { category: '건강카페', product: {...product, target_concern: '', product_category: ''} };
  } else if (ch.startsWith('커뮤니티')) {
    apiChannel = 'community';
    bodyData = { keywords: [keyword], community: '뽐뿌', strategy: '1', product, appeal: '', buying_one: '', forbidden: '' };
  } else {
    document.getElementById('bpResult').innerHTML = '<div style="color:var(--red);font-size:13px">이 채널은 build-prompt를 지원하지 않습니다.</div>';
    return;
  }

  const btn = document.getElementById('bpBtn');
  const btnAll = document.getElementById('bpBtnAll');
  btn.disabled = true; btnAll.disabled = true;
  btn.textContent = '생성 중...';
  btnAll.textContent = '생성 중...';
  document.getElementById('bpResult').innerHTML = '<div style="color:var(--text3);font-size:12px">서버에서 크롤링+분석 중... (최대 30초)</div>';

  try {
    const resp = await fetch('/api/' + apiChannel + '/build-prompt', {
      method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(bodyData)
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    // 결과에서 combined 추출 — 현재 선택된 채널에 따라 필터링
    let allPrompts = [];
    if (data.results) {
      data.results.forEach(r => {
        if (r.analysis) allPrompts.push({label: '상위글 분석', text: '사진 '+r.analysis.photo_count+'장, 키워드 '+r.analysis.keyword_repeat+'회, 글자수 '+r.analysis.char_count+'자', copyable: false, type: 'analysis'});
        if (r.crawled) {
          let crawlText = '';
          if (r.crawled.articles && r.crawled.articles.length) {
            r.crawled.articles.forEach((a,i) => {
              crawlText += `${i+1}. ${a.url}\n   글자수: ${a.char_count}자 | 사진: ${a.photo_count}장 | 키워드: ${a.keyword_repeat}회\n`;
            });
            const avg = Math.round(r.crawled.articles.reduce((s,a) => s+a.char_count, 0) / r.crawled.articles.length);
            crawlText += `\n평균: ${avg}자 → 기준: ${Math.floor(avg*0.9)}~${Math.ceil(avg*1.1)}자 (±10%)`;
          }
          if (r.crawled.top_titles && r.crawled.top_titles.length) {
            crawlText += '\n\n상위글 제목:\n' + r.crawled.top_titles.map((t,i) => (i+1)+'. '+t).join('\n');
          }
          if (crawlText) allPrompts.push({label: '크롤링 결과', text: crawlText.trim(), copyable: false, type: 'crawled'});
        }
        if (r.title_prompt) allPrompts.push({label: '제목 프롬프트', text: wrapForSecretChat(r.title_prompt.system_prompt, r.title_prompt.user_prompt), copyable: true, type: 'title'});
        if (r.body_prompt) allPrompts.push({label: '본문 프롬프트', text: wrapForSecretChat(r.body_prompt.system_prompt, r.body_prompt.user_prompt), copyable: true, type: 'body'});
        if (r.comments_prompt) allPrompts.push({label: '댓글 프롬프트', text: wrapForSecretChat(r.comments_prompt.system_prompt, r.comments_prompt.user_prompt), copyable: true, type: 'comments'});
        if (r.replies_prompt) allPrompts.push({label: '답글 프롬프트', text: wrapForSecretChat(r.replies_prompt.system_prompt, r.replies_prompt.user_prompt), copyable: true, type: 'replies'});
        if (r.answers_prompt) allPrompts.push({label: '답변 프롬프트', text: wrapForSecretChat(r.answers_prompt.system_prompt, r.answers_prompt.user_prompt), copyable: true, type: 'answers'});
        if (r.post_prompt) allPrompts.push({label: '침투글 프롬프트', text: wrapForSecretChat(r.post_prompt.system_prompt, r.post_prompt.user_prompt), copyable: true, type: 'post'});
      });
    } else if (data.steps) {
      data.steps.forEach(s => allPrompts.push({label: s.name, text: wrapForSecretChat(s.system_prompt, s.user_prompt != null ? s.user_prompt : s.combined), copyable: true, type: 'step'}));
    } else if (data.body_prompt) {
      if (data.ad_title) allPrompts.push({label: '생성된 광고 제목', text: data.ad_title, copyable: false, type: 'ad'});
      if (data.ad_desc) allPrompts.push({label: '생성된 광고 설명', text: data.ad_desc, copyable: false, type: 'ad'});
      allPrompts.push({label: '본문 프롬프트', text: wrapForSecretChat(data.body_prompt.system_prompt, data.body_prompt.user_prompt), copyable: true, type: 'body'});
    }

    // mode에 따라 필터링 — crawled(크롤링 원문)는 항상 포함
    let prompts = allPrompts;
    if (mode === 'single') {
      // 현재 선택된 채널에 해당하는 프롬프트만 + 크롤링 원문은 항상 표시
      if (ch.includes('질문제목')) {
        prompts = allPrompts.filter(p => p.type === 'analysis' || p.type === 'title' || p.type === 'crawled');
      } else if (ch.includes('질문본문')) {
        prompts = allPrompts.filter(p => p.type === 'body' || p.type === 'crawled');
      } else if (ch.includes('제목') || ch.includes('변환')) {
        prompts = allPrompts.filter(p => p.type === 'analysis' || p.type === 'title' || p.type === 'crawled');
      } else if (ch.includes('본문')) {
        prompts = allPrompts.filter(p => p.type === 'analysis' || p.type === 'body' || p.type === 'crawled');
      } else if (ch.includes('답글')) {
        prompts = allPrompts.filter(p => p.type === 'replies' || p.type === 'crawled');
      } else if (ch.includes('댓글')) {
        prompts = allPrompts.filter(p => p.type === 'comments' || p.type === 'crawled');
      } else if (ch.includes('답변')) {
        prompts = allPrompts.filter(p => p.type === 'answers' || p.type === 'crawled');
      }
      if (prompts.length === 0) prompts = allPrompts;
    }
    // mode === 'all' 이면 allPrompts 그대로 사용

    let html = '';
    prompts.forEach((p, i) => {
      html += '<div style="margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
      html += '<strong style="font-size:13px;color:' + (p.copyable ? 'var(--green)' : 'var(--blue)') + '">' + escHtml(p.label) + '</strong>';
      if (p.copyable) html += '<button onclick="bpCopy('+i+')" style="padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">📋 복사</button>';
      html += '</div>';
      if (p.copyable) {
        html += '<textarea id="bpText'+i+'" readonly style="width:100%;height:100px;font-size:11px;font-family:monospace;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:8px;color:var(--text);resize:vertical">' + escHtml(p.text) + '</textarea>';
      } else if (p.type === 'crawled') {
        html += '<div style="font-size:12px;color:var(--text2);white-space:pre-wrap;background:var(--bg2);padding:8px;border-radius:4px">' + escHtml(p.text) + '</div>';
      } else {
        html += '<div style="font-size:12px;color:var(--text2);white-space:pre-wrap">' + escHtml(p.text) + '</div>';
      }
      html += '</div>';
    });
    document.getElementById('bpResult').innerHTML = html;
  } catch(e) {
    document.getElementById('bpResult').innerHTML = '<div style="color:var(--red);font-size:13px">실패: ' + escHtml(e.message) + '</div>';
  }
  btn.disabled = false; btnAll.disabled = false;
  btn.textContent = '🚀 이 프롬프트만 생성';
  btnAll.textContent = '📦 전체 사이클 생성 (제목+본문+댓글)';
}

function bpShowAll() {
  const prompts = window._allPrompts || [];
  let html = '';
  prompts.forEach((p, i) => {
    html += '<div style="margin-bottom:12px;padding:12px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    html += '<strong style="font-size:13px;color:' + (p.copyable ? 'var(--green)' : 'var(--blue)') + '">' + escHtml(p.label) + '</strong>';
    if (p.copyable) html += '<button onclick="bpCopy('+i+')" style="padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px">📋 복사</button>';
    html += '</div>';
    if (p.copyable) {
      html += '<textarea id="bpText'+i+'" readonly style="width:100%;height:100px;font-size:11px;font-family:monospace;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:8px;color:var(--text);resize:vertical">' + escHtml(p.text) + '</textarea>';
    } else {
      html += '<div style="font-size:12px;color:var(--text2);white-space:pre-wrap;max-height:60px;overflow-y:auto">' + escHtml(p.text) + '</div>';
    }
    html += '</div>';
  });
  document.getElementById('bpResult').innerHTML = html;
}

function bpCopy(idx) {
  const ta = document.getElementById('bpText' + idx);
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    alert('복사 완료! claude.ai 시크릿 채팅에 붙여넣기 하세요.');
  }).catch(() => { ta.select(); document.execCommand('copy'); });
}

function toggleCrawl(idx) {
  var el = document.getElementById('bpCrawl' + idx);
  var btn = document.getElementById('bpCrawlBtn' + idx);
  if (!el || !btn) return;
  if (el.getAttribute('data-collapsed') === '1') {
    el.style.maxHeight = 'none';
    el.style.overflow = 'auto';
    el.setAttribute('data-collapsed', '0');
    btn.textContent = '▲ 접기';
  } else {
    el.style.maxHeight = '80px';
    el.style.overflow = 'hidden';
    el.setAttribute('data-collapsed', '1');
    btn.textContent = '▼ 펼치기';
  }
}

function runOutputCheck() {
  const text = document.getElementById('outputCheck').value.trim();
  if (!text) { alert('본문을 붙여넣으세요'); return; }

  const keyword = document.getElementById('checkKeyword').value.trim();
  const targetChar = parseInt(document.getElementById('checkTargetChar').value) || 0;
  const targetKw = parseInt(document.getElementById('checkTargetKw').value) || 0;
  const targetPhoto = parseInt(document.getElementById('checkTargetPhoto').value) || 0;

  const results = [];

  // 1. 글자수 (공백 포함)
  const charCount = text.length;
  const charNoSpace = text.replace(/\s/g, '').length;
  if (targetChar > 0) {
    const min = Math.floor(targetChar * 0.9);
    const max = Math.ceil(targetChar * 1.1);
    const ok = charCount >= min && charCount <= max;
    results.push({label: '글자수 (공백포함)', value: `${charCount}자`, target: `${min}~${max}자 (평균 ${targetChar}의 ±10%)`, pass: ok});
  } else {
    results.push({label: '글자수 (공백포함)', value: `${charCount}자`, target: '-', pass: null});
  }
  results.push({label: '글자수 (공백제외)', value: `${charNoSpace}자`, target: '-', pass: null});

  // 2. 키워드 반복수
  if (keyword) {
    const kwCount = (text.match(new RegExp(keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi')) || []).length;
    const kwOk = targetKw > 0 ? kwCount >= targetKw : null;
    results.push({label: `키워드 "${keyword}"`, value: `${kwCount}회`, target: targetKw > 0 ? `${targetKw}회` : '-', pass: kwOk});
  }

  // 3. 사진/이미지 태그 수
  const imgTags = (text.match(/\[이미지\d*\]|\[사진\d*\]/gi) || []).length;
  const photoOk = targetPhoto > 0 ? imgTags >= targetPhoto : null;
  results.push({label: '이미지 태그', value: `${imgTags}개`, target: targetPhoto > 0 ? `${targetPhoto}개` : '-', pass: photoOk});

  // 4. 문단 수
  const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim()).length;
  results.push({label: '문단 수', value: `${paragraphs}개`, target: '8개 이상', pass: paragraphs >= 8});

  // 5. [링크] 태그
  const hasLink = text.includes('[링크]');
  results.push({label: '[링크] 태그', value: hasLink ? '있음' : '없음', target: '있어야 함', pass: hasLink});

  // 6. 장 관련 키워드 체크
  const gutWords = ['장 건강', '장건강', '장내', '장 환경', '장 상태', '장에 도움', '장이 개선', '흡수 효율', '흡수율'];
  const foundGut = gutWords.filter(w => text.includes(w));
  results.push({label: '장 관련 서술', value: foundGut.length > 0 ? `발견: ${foundGut.join(', ')}` : '없음 ✓', target: '없어야 함', pass: foundGut.length === 0});

  // 7. 광고성 표현 체크
  const adWords = ['대박', '강추', '꼭 사세요', '인생템', '완전 강추', '효과 보장', '완치'];
  const foundAd = adWords.filter(w => text.includes(w));
  results.push({label: '광고성 표현', value: foundAd.length > 0 ? `발견: ${foundAd.join(', ')}` : '없음 ✓', target: '없어야 함', pass: foundAd.length === 0});

  // 렌더링
  let html = '<table style="width:100%;font-size:13px;border-collapse:collapse;">';
  html += '<tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:6px;">항목</th><th style="text-align:left;padding:6px;">결과</th><th style="text-align:left;padding:6px;">기준</th><th style="text-align:center;padding:6px;">판정</th></tr>';
  results.forEach(r => {
    const icon = r.pass === true ? '✅' : r.pass === false ? '❌' : '➖';
    const color = r.pass === true ? '#22c55e' : r.pass === false ? '#ef4444' : 'var(--text2)';
    html += `<tr style="border-bottom:1px solid var(--border);">
      <td style="padding:6px;color:var(--text)">${r.label}</td>
      <td style="padding:6px;color:${color};font-weight:600">${r.value}</td>
      <td style="padding:6px;color:var(--text2)">${r.target}</td>
      <td style="padding:6px;text-align:center;font-size:16px">${icon}</td>
    </tr>`;
  });
  html += '</table>';

  const passCount = results.filter(r => r.pass === true).length;
  const failCount = results.filter(r => r.pass === false).length;
  html += `<div style="margin-top:8px;font-size:13px;font-weight:600;color:${failCount > 0 ? '#ef4444' : '#22c55e'}">✅ ${passCount}개 통과 / ❌ ${failCount}개 실패</div>`;

  document.getElementById('checkResult').innerHTML = html;
}

renderTree();
